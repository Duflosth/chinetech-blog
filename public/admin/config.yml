backend:
  name: git-gateway
  branch: master

media_folder: public/uploads
public_folder: /uploads

locale: fr

collections:
  - name: articles
    label: Articles
    folder: src/content/articles
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Titre, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
      - { label: Auteur, name: author, widget: string, default: "Redaction CHINETECH" }
      - { label: Tags, name: tags, widget: list, default: ["Tech"] }
      - { label: Image de couverture, name: cover, widget: image, required: false }
      - { label: Brouillon, name: draft, widget: boolean, default: true }
      - { label: À la une, name: featured, widget: boolean, default: false }
      - { label: Rang À la une, name: featuredRank, widget: number, value_type: int, min: 1, required: false }
      - { label: Corps, name: body, widget: markdown }
